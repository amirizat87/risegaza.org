<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Konvoi Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-sA+e2j7n2K+DxF6mbW+xO2B9DRF0JfSiV+QF0v0u7r0="
    crossorigin=""
  />
  <style>
    body, html { margin:0; padding:0; height:100%; }
    #map { height:100%; }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-o9N1j8o2F1FzWqN4b+fhQwHGSZt7z3wX0fMgn3h+vY="
    crossorigin=""
  ></script>

  <script>
    // Inisialisasi peta (ubah koordinat kalau perlu)
    const map = L.map('map').setView([3.1390, 101.6869], 12);

    // Tile layer OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Titik konvoi contoh
    const convoy = [
      { name: 'Start', lat: 3.1390, lng: 101.6869 },
      { name: 'Checkpoint 1', lat: 3.1500, lng: 101.7000 },
      { name: 'Checkpoint 2', lat: 3.1600, lng: 101.7100 }
    ];

    // Marker + popup
    convoy.forEach(p => {
      L.marker([p.lat, p.lng])
        .addTo(map)
        .bindPopup(p.name);
    });

    // Garisan laluan
    const route = convoy.map(p => [p.lat, p.lng]);
    L.polyline(route, { color: 'blue', weight: 4 }).addTo(map);
  </script>
</body>
</html>
